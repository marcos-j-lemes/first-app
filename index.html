<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World PWA</title>

  <!-- PWA essentials -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#00ff88" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HelloPWA" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff88;
      --bg: #0a0a0a;
      --card: #111111;
      --border: #1f1f1f;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Space Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 14vw, 5.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    h1 span {
      color: var(--green);
      display: block;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s forwards;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.8s forwards;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #444;
    }

    .status-row + .status-row {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
      margin-right: 0.5rem;
      transition: background 0.4s;
    }

    .dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.offline { background: #ff4444; }

    .val { color: #fff; font-weight: 700; }

    #install-btn {
      display: none;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.6s 1s forwards;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #install-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,255,136,0.3);
    }

    #install-btn.visible { display: block; }

    .hint {
      font-size: 0.7rem;
      color: #333;
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 1.1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="badge">✦ Progressive Web App</div>

  <h1>Hello<span>World.</span></h1>

  <p class="subtitle">// seu primeiro PWA no ar</p>

  <div class="card">
    <div class="status-row">
      <span><span class="dot" id="dot-sw"></span>Service Worker</span>
      <span class="val" id="val-sw">verificando...</span>
    </div>
    <div class="status-row">
      <span><span class="dot" id="dot-net"></span>Conexão</span>
      <span class="val" id="val-net">—</span>
    </div>
    <div class="status-row">
      <span>Cache</span>
      <span class="val" id="val-cache">—</span>
    </div>
  </div>

  <button id="install-btn">⬇ Instalar no celular</button>

  <p class="hint">Abra no celular → menu do browser → "Adicionar à tela inicial"</p>
</div>

<script>
  // --- Status de rede ---
  const dotNet = document.getElementById('dot-net');
  const valNet = document.getElementById('val-net');

  function updateNet() {
    if (navigator.onLine) {
      dotNet.className = 'dot online';
      valNet.textContent = 'online';
    } else {
      dotNet.className = 'dot offline';
      valNet.textContent = 'offline';
    }
  }
  updateNet();
  window.addEventListener('online',  updateNet);
  window.addEventListener('offline', updateNet);

  // --- Service Worker ---
  const dotSW = document.getElementById('dot-sw');
  const valSW = document.getElementById('val-sw');
  const valCache = document.getElementById('val-cache');

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        dotSW.className = 'dot online';
        valSW.textContent = 'ativo';
        valCache.textContent = 'habilitado';
        console.log('[SW] Registrado:', reg.scope);
      })
      .catch(err => {
        dotSW.className = 'dot offline';
        valSW.textContent = 'erro';
        valCache.textContent = 'desabilitado';
        console.error('[SW] Erro:', err);
      });
  } else {
    valSW.textContent = 'não suportado';
  }

  // --- Botão de instalação ---
  let deferredPrompt;
  const installBtn = document.getElementById('install-btn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('visible');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Instalação:', outcome);
    deferredPrompt = null;
    installBtn.classList.remove('visible');
  });
</script>

</body>
</html>
